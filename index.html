  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;0,700;1,300;1,400&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    /* ============ RESET & BASE ============ */
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: #FAF6F0;
      color: #1a1a1a;
      min-height: 100vh;
      overflow-x: hidden;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }
    a { text-decoration: none; color: inherit; }
    ::-webkit-scrollbar { width: 0; height: 0; }
    * { scrollbar-width: none; }

    /* ============ CSS VARIABLES (theme colors per tab) ============ */
    :root {
      --cream: #FAF6F0;
      --cream-dark: #EDE8E0;
      --ink: #1a1a1a;
      --ink-light: #6b6560;
      --ink-muted: #9a938c;
      --border: rgba(26,26,26,0.08);
      --color-restaurants: #7D4C52;
      --color-restaurants-light: #F2E8EA;
      --color-restaurants-bg: #DCC8CB;
      --color-asia: #F0E87D;
      --color-asia-light: #FDFBE8;
      --color-asia-bg: #F7F3D0;
      --color-bars: #1B365D;
      --color-bars-light: #E6EBF2;
      --color-bars-bg: #C8D2E0;
      --color-condenast: #C47D5A;
      --color-condenast-light: #F5ECE6;
      --color-condenast-bg: #E8D4C6;
      --active-color: var(--color-restaurants);
      --active-light: var(--color-restaurants-light);
      --active-bg: var(--color-restaurants-bg);
    }

    /* ============ HEADER ============ */
    .header {
      text-align: center;
      padding: 48px 20px 16px;
      background: var(--cream);
    }
    .header h1 {
      font-family: 'Cormorant Garamond', Georgia, serif;
      font-size: clamp(28px, 4vw, 52px);
      font-weight: 300;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--ink);
    }
    .header h1 span {
      color: var(--active-color);
      transition: color 0.3s;
      font-style: italic;
      font-weight: 400;
      letter-spacing: 0.08em;
    }
    .header p {
      font-size: clamp(9px, 1vw, 12px);
      color: var(--ink-muted);
      margin-top: 10px;
      font-weight: 400;
      letter-spacing: 0.25em;
      text-transform: uppercase;
    }

    /* ============ TAB BAR ============ */
    .tab-bar {
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
      gap: 10px;
      padding: 24px 20px 28px;
      background: var(--cream);
    }
    .tab-btn {
      padding: 10px 24px;
      border: 1.5px solid transparent;
      border-radius: 999px;
      background: transparent;
      font-family: 'Inter', sans-serif;
      font-size: clamp(12px, 1.3vw, 15px);
      font-weight: 500;
      cursor: pointer;
      transition: all 0.15s cubic-bezier(0.4, 0, 0.2, 1);
      white-space: nowrap;
      color: var(--ink-muted);
      letter-spacing: 0.1em;
      text-transform: uppercase;
      box-shadow: none;
    }
    .tab-btn:hover {
      color: var(--ink);
      border-color: var(--ink);
      background: #fff;
      box-shadow: 3px 3px 0 0 var(--ink);
    }
    .tab-btn.active {
      color: var(--active-color);
      border-color: var(--active-color);
      background: #fff;
      font-weight: 600;
      box-shadow: 3px 3px 0 0 var(--active-color);
    }

    /* ============ FILTER BAR ============ */
    .filter-bar {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 16px;
      padding: 14px 20px;
      background: var(--cream);
      border-bottom: 1px solid var(--border);
      flex-wrap: wrap;
    }
    .filter-bar label {
      font-size: 10px;
      font-weight: 500;
      color: var(--ink-muted);
      text-transform: uppercase;
      letter-spacing: 0.2em;
    }
    .filter-select {
      padding: 7px 14px;
      border: 1px solid rgba(26,26,26,0.12);
      border-radius: 0;
      font-family: 'Inter', sans-serif;
      font-size: 12px;
      font-weight: 400;
      background: transparent;
      color: var(--ink);
      cursor: pointer;
      outline: none;
      transition: border-color 0.3s;
      min-width: 150px;
      letter-spacing: 0.04em;
    }
    .filter-select:focus {
      border-color: var(--ink);
    }
    .filter-reset {
      padding: 7px 14px;
      border: 1px solid rgba(26,26,26,0.12);
      border-radius: 0;
      background: transparent;
      font-family: 'Inter', sans-serif;
      font-size: 10px;
      font-weight: 500;
      color: var(--ink-muted);
      cursor: pointer;
      transition: all 0.3s;
      letter-spacing: 0.15em;
      text-transform: uppercase;
    }
    .filter-reset:hover {
      border-color: var(--ink);
      color: var(--ink);
    }

    /* ============ MAIN LAYOUT ============ */
    .main {
      display: grid;
      grid-template-columns: 1fr 400px;
      height: calc(100vh - 240px);
      min-height: 500px;
    }

    /* ============ MAP ============ */
    .map-container {
      position: relative;
    }
    #map {
      width: 100%;
      height: 100%;
    }
    /* Custom InfoWindow */
    .gm-style-iw-d { overflow: auto !important; max-height: 400px !important; padding-right: 0 !important; }
    .gm-style-iw-c { padding: 12px !important; }
    .gm-style-iw-chr { display: none !important; }
    .gm-style-iw-c button.gm-ui-hover-effect { display: none !important; }
    .gm-style-iw-tc { display: none !important; }
    .info-window { position: relative; }
    .info-window .iw-close-btn {
      position: absolute; top: 0; right: 0; z-index: 10;
      width: 36px; height: 36px; border: none; border-radius: 0 0 0 8px;
      background: linear-gradient(135deg, transparent 0%, rgba(0,0,0,0.3) 100%);
      cursor: pointer; display: flex; align-items: center; justify-content: center;
      font-size: 18px; color: rgba(255,255,255,0.9); line-height: 1;
      transition: color 0.15s; padding: 0;
    }
    .info-window .iw-close-btn:hover { color: #fff; }
    .info-window {
      width: 280px;
      max-width: 280px;
      font-family: 'Inter', sans-serif;
      padding-bottom: 4px;
      overflow: hidden;
      box-sizing: border-box;
    }
    .info-window .iw-img {
      width: 100%;
      height: 150px;
      object-fit: cover;
      border-radius: 2px;
      margin-bottom: 10px;
      display: block;
      background: var(--cream-dark);
      box-sizing: border-box;
    }
    .info-window .iw-rank {
      display: inline-block;
      background: var(--active-color);
      color: white;
      font-size: 10px;
      font-weight: 500;
      padding: 3px 10px;
      border-radius: 0;
      margin-bottom: 6px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }
    .info-window h3 {
      font-family: 'Cormorant Garamond', Georgia, serif;
      font-size: 18px;
      font-weight: 500;
      margin-bottom: 4px;
      letter-spacing: 0.05em;
    }
    .info-window .iw-location {
      font-size: 11px;
      color: var(--ink-muted);
      margin-bottom: 8px;
      letter-spacing: 0.06em;
    }
    .info-window .iw-desc {
      font-size: 12px;
      line-height: 1.6;
      color: var(--ink-light);
      margin-bottom: 8px;
    }
    .info-window .iw-links {
      display: flex;
      gap: 12px;
      align-items: center;
      margin-bottom: 10px;
    }
    .info-window .iw-link {
      display: inline-block;
      font-size: 11px;
      font-weight: 500;
      color: var(--active-color);
      letter-spacing: 0.1em;
      text-transform: uppercase;
      border-bottom: 1px solid var(--active-color);
      padding-bottom: 1px;
    }
    .info-window .iw-link:hover { opacity: 0.6; text-decoration: none; }

    /* Google Reviews */
    .iw-google-section {
      border-top: 1px solid var(--border);
      padding-top: 10px;
      margin-top: 4px;
    }
    .iw-rating-row {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-bottom: 8px;
    }
    .iw-rating-score {
      font-family: 'Cormorant Garamond', Georgia, serif;
      font-size: 22px;
      font-weight: 600;
      color: var(--ink);
    }
    .iw-stars {
      color: #b8a080;
      font-size: 13px;
      letter-spacing: 1px;
    }
    .iw-rating-count {
      font-size: 11px;
      color: var(--ink-muted);
      font-weight: 400;
    }
    .iw-review {
      background: rgba(26,26,26,0.03);
      border-radius: 2px;
      padding: 8px 10px;
      margin-bottom: 6px;
    }
    .iw-review-header {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-bottom: 4px;
    }
    .iw-review-author {
      font-size: 11px;
      font-weight: 500;
      color: var(--ink);
    }
    .iw-review-stars {
      font-size: 10px;
      color: #b8a080;
    }
    .iw-review-time {
      font-size: 10px;
      color: var(--ink-muted);
      margin-left: auto;
    }
    .iw-review-text {
      font-size: 11px;
      color: var(--ink-light);
      line-height: 1.5;
      display: -webkit-box;
      -webkit-line-clamp: 3;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .iw-loading-reviews {
      font-size: 11px;
      color: var(--ink-muted);
      padding: 8px 0;
      letter-spacing: 0.05em;
    }
    .iw-google-link {
      display: inline-block;
      font-size: 10px;
      font-weight: 500;
      color: var(--ink);
      margin-top: 4px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      border-bottom: 1px solid var(--ink);
      padding-bottom: 1px;
    }
    .iw-google-link:hover { opacity: 0.6; text-decoration: none; }
    /* Transport section */
    .iw-transport {
      border-top: 1px solid var(--border);
      padding-top: 10px;
      margin-top: 8px;
    }
    .iw-transport-title {
      font-size: 9px;
      font-weight: 500;
      color: var(--ink-muted);
      text-transform: uppercase;
      letter-spacing: 0.2em;
      margin-bottom: 6px;
    }
    .iw-transport-item {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 11px;
      color: var(--ink-light);
      line-height: 1.4;
      margin-bottom: 6px;
    }
    .iw-transport-icon {
      flex-shrink: 0;
      font-size: 12px;
      line-height: 1.4;
    }
    .iw-transport-name {
      font-weight: 500;
      color: var(--ink);
    }
    .iw-transport-code {
      display: inline-block;
      background: #edf2f8;
      color: #4a6a9a;
      font-size: 9px;
      font-weight: 600;
      padding: 1px 5px;
      border-radius: 3px;
      margin-left: 4px;
      letter-spacing: 0.08em;
    }
    .iw-transport-detail {
      color: var(--ink-muted);
      font-size: 10px;
    }
    .card-transport {
      display: flex;
      flex-wrap: wrap;
      gap: 4px;
      margin-top: 4px;
    }
    .card-transport-tag {
      display: inline-flex;
      align-items: center;
      gap: 3px;
      font-size: 9px;
      font-weight: 600;
      color: #4a6a9a;
      background: #edf2f8;
      border: 1px solid #c4d4e8;
      border-radius: 3px;
      padding: 1px 6px;
      letter-spacing: 0.03em;
    }
    .card-transport-tag.train {
      color: #4a7a5a;
      background: #edf5ef;
      border-color: #c0dac8;
    }

    /* Skyscanner flight search */
    .sky-link {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      font-size: 10px;
      font-weight: 500;
      color: #0770e3;
      letter-spacing: 0.06em;
      padding: 3px 8px;
      border-radius: 3px;
      background: #e8f2fc;
      border: 1px solid #b8d8f8;
      transition: all 0.2s;
      white-space: nowrap;
      margin-left: auto;
    }
    .sky-link:hover {
      background: #d0e8fc;
      border-color: #8cc0f0;
      text-decoration: none;
    }
    .sky-link svg {
      width: 12px;
      height: 12px;
      fill: #0770e3;
    }
    .iw-link.sky-hotel {
      color: #0770e3;
      border-bottom-color: #0770e3;
    }
    .iw-link.sky-hotel:hover { opacity: 0.6; }

    .iw-price-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 10px;
      padding: 6px 10px;
      background: #eef6f0;
      border-radius: 4px;
      border: 1px solid #c8e0cc;
    }
    .iw-price-level {
      font-size: 14px;
      font-weight: 600;
      color: #5a8a64;
    }
    .iw-price-range {
      font-size: 11px;
      color: var(--ink-light);
      font-weight: 400;
    }

    /* Card price & rating badge */
    .card-meta {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-top: 6px;
      flex-wrap: wrap;
    }
    .card-price {
      display: inline-block;
      font-size: 10px;
      font-weight: 600;
      color: #5a8a64;
      background: #eef6f0;
      border: 1px solid #c8e0cc;
      border-radius: 4px;
      padding: 2px 6px;
      letter-spacing: 0.03em;
    }
    .card-rating {
      display: inline-flex;
      align-items: center;
      gap: 3px;
      font-size: 10px;
      font-weight: 400;
      color: var(--ink-light);
    }
    .card-rating .card-stars {
      color: #c4a04e;
      font-size: 10px;
    }

    /* ============ CARD LIST ============ */
    .card-panel {
      background: var(--active-light);
      transition: background 0.3s;
      overflow-y: auto;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      min-height: 0;
      border-left: 1px solid var(--border);
    }

    .card {
      background: rgba(255,255,255,0.5);
      border-radius: 4px;
      overflow: hidden;
      cursor: pointer;
      transition: all 0.15s cubic-bezier(0.4, 0, 0.2, 1);
      border: 1.5px solid var(--border);
      box-shadow: none;
      display: flex;
      flex-direction: column;
      flex-shrink: 0;
    }
    .card:hover {
      background: #fff;
      border-color: var(--active-color);
      box-shadow: 3px 3px 0 0 var(--active-color);
    }
    .card.active {
      border-color: var(--active-color);
      background: #fff;
      box-shadow: 3px 3px 0 0 var(--active-color);
    }

    .card-img {
      width: 100%;
      height: 160px;
      object-fit: cover;
      display: block;
      background: var(--cream-dark);
    }
    .card-img-placeholder {
      width: 100%;
      height: 160px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--cream-dark);
      font-size: 32px;
      color: var(--ink-muted);
      opacity: 0.4;
    }

    .card-content {
      padding: 14px;
      display: flex;
      gap: 12px;
      align-items: flex-start;
    }

    .card-rank {
      flex-shrink: 0;
      width: 32px;
      height: 32px;
      border-radius: 0;
      background: var(--active-color);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      font-weight: 500;
      color: white;
      transition: background 0.3s, color 0.3s;
    }

    .card-body { flex: 1; min-width: 0; }
    .card-name {
      font-family: 'Cormorant Garamond', Georgia, serif;
      font-size: 17px;
      font-weight: 500;
      margin-bottom: 2px;
      line-height: 1.3;
      color: var(--ink);
      letter-spacing: 0.03em;
    }
    .card-location {
      font-size: 10px;
      color: var(--ink-muted);
      font-weight: 400;
      margin-bottom: 6px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }
    .card-desc {
      font-size: 11px;
      color: var(--ink-light);
      line-height: 1.6;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .card-link {
      display: inline-block;
      margin-top: 6px;
      font-size: 10px;
      font-weight: 500;
      color: var(--active-color);
      transition: opacity 0.3s;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      border-bottom: 1px solid var(--active-color);
      padding-bottom: 1px;
    }
    .card-link:hover { opacity: 0.6; text-decoration: none; }

    /* count badge */
    .list-count {
      text-align: center;
      font-size: 10px;
      font-weight: 400;
      color: var(--ink-muted);
      padding: 8px 0;
      letter-spacing: 0.15em;
      text-transform: uppercase;
    }

    /* No results */
    .no-results {
      text-align: center;
      padding: 40px 20px;
      color: var(--ink-muted);
      font-weight: 400;
      letter-spacing: 0.1em;
    }

    /* ============ RESPONSIVE ============ */
    @media (max-width: 900px) {
      .main {
        grid-template-columns: 1fr;
        grid-template-rows: 50vh 1fr;
        height: auto;
      }
      .card-panel {
        max-height: 60vh;
        border-left: none;
        border-top: 1px solid var(--border);
      }
    }
/* ============ FOOTER ============ */
    .site-footer {
      background: var(--cream);
      border-top: 1px solid var(--cream-dark);
      padding: 14px 0;
      text-align: center;
      font-family: 'Cormorant Garamond', serif;
      font-size: 14px;
      letter-spacing: 0.08em;
      color: #999;
    }
    .site-footer a {
      color: #999;
      text-decoration: none;
      transition: color 0.15s;
    }
    .site-footer a:hover { color: #666; }
    .site-footer .heart {
      color: #C47D5A;
      font-style: normal;
    }

    @media (max-width: 600px) {
      .tab-btn {
        font-size: 11px;
        padding: 10px 16px;
      }
      .filter-bar {
        gap: 8px;
      }
      .filter-select {
        min-width: 120px;
        font-size: 11px;
      }
      .site-footer { padding: 12px 0; }
    }

    /* ============ LOADING ============ */
    .loading {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100%;
      font-weight: 400;
      color: var(--ink-muted);
      font-size: 12px;
      letter-spacing: 0.15em;
      text-transform: uppercase;
    }
    .loading::after {
      content: '';
      width: 16px; height: 16px;
      border: 1px solid var(--cream-dark);
      border-top-color: var(--ink);
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin-left: 10px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Transport toggle */
    .transport-toggle {
      position: absolute;
      top: 10px;
      left: 10px;
      z-index: 5;
      display: flex;
      gap: 6px;
    }
    .transport-toggle button {
      padding: 6px 12px;
      border: 1px solid rgba(26,26,26,0.12);
      border-radius: 0;
      background: rgba(237,231,222,0.95);
      font-family: 'Inter', sans-serif;
      font-size: 10px;
      font-weight: 500;
      cursor: pointer;
      color: var(--ink-light);
      box-shadow: 0 1px 4px rgba(0,0,0,0.08);
      transition: all 0.3s;
      letter-spacing: 0.05em;
    }
    .transport-toggle button:hover {
      border-color: var(--ink);
      color: var(--ink);
    }
    .transport-toggle button.active {
      background: var(--ink);
      border-color: var(--ink);
      color: var(--cream);
    }
    .transport-toggle button.active.train-btn {
      background: var(--ink);
      border-color: var(--ink);
    }

    /* marker bounce */
    @keyframes bounce {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-10px); }
    }
  </style>
</head>
<body>

  <!-- HEADER -->
<div class="header">
    <h1>World's Best <span>on the Map</span></h1>
    <p>Explore the world's finest restaurants, bars, and more — all on one map</p>
  </div>

  <!-- TAB BAR -->
  <div class="tab-bar" id="tabBar">
    <button class="tab-btn active" data-tab="restaurants">
      World's Best Restaurants
    </button>
    <button class="tab-btn" data-tab="asia-restaurants">
      Asia's Best Restaurants
    </button>
    <button class="tab-btn" data-tab="bars">
      World's Best Bars
    </button>
    <button class="tab-btn" data-tab="condenast">
      Condé Nast Traveler
    </button>
  </div>

  <!-- FILTER BAR -->
  <div class="filter-bar">
    <label>Filter:</label>
    <select class="filter-select" id="countryFilter">
      <option value="">All Countries</option>
    </select>
    <select class="filter-select" id="cityFilter">
      <option value="">All Cities</option>
    </select>
    <select class="filter-select" id="sortSelect">
      <option value="rank">Sort by Rank</option>
      <option value="price-asc">Price: Low → High</option>
      <option value="price-desc">Price: High → Low</option>
      <option value="rating">Highest Rated</option>
    </select>
    <button class="filter-reset" id="resetFilter">Reset</button>
  </div>

  <!-- MAIN: MAP + CARDS -->
  <div class="main">
    <div class="map-container">
      <div id="map"><div class="loading">Loading map</div></div>
      <div class="transport-toggle">
        <button id="toggleAirports" onclick="toggleTransportMarkers('airports')">✈️ Airports</button>
        <button id="toggleTrains" class="train-btn" onclick="toggleTransportMarkers('trains')">🚆 Stations</button>
      </div>
    </div>
    <div class="card-panel" id="cardPanel">
      <div class="loading">Loading data</div>
    </div>
  </div>

  <!-- DATA FILES -->
  <script src="data/restaurants.js"></script>
  <script src="data/asia-restaurants.js"></script>
  <script src="data/bars.js"></script>
  <script src="data/condenast.js"></script>
  <script src="data/transport.js"></script>

  <!-- MAIN SCRIPT -->
  <script>
    // ============ STATE ============
    let map, infoWindow;
    let markers = [];
    let activeTab = 'restaurants';
    let activeCardEl = null;

    const datasets = {
      'restaurants': () => window.DATA_RESTAURANTS || [],
      'asia-restaurants': () => window.DATA_ASIA_RESTAURANTS || [],
      'bars': () => window.DATA_BARS || [],
      'condenast': () => window.DATA_CONDENAST || [],
    };

    // ============ IMAGE URL ============
    function getImageUrl(item, width, height) {
      if (item.image) return item.image;
      const seed = encodeURIComponent(item.name.replace(/\s+/g, '-').toLowerCase());
      return `https://picsum.photos/seed/${seed}/${width}/${height}`;
    }

    function handleImgError(img) {
      // If already tried Google photo, show placeholder
      if (img.dataset.triedGoogle) {
        const placeholder = document.createElement('div');
        placeholder.className = 'card-img-placeholder';
        placeholder.textContent = tabEmoji[activeTab] || '📍';
        img.replaceWith(placeholder);
        return;
      }
      // Try to find a Google Places photo from cache
      const card = img.closest('.card');
      if (card) {
        const index = parseInt(card.dataset.index);
        const data = getFilteredData();
        const item = data[index];
        if (item) {
          const cacheKey = `${item.name}_${item.city}`;
          const place = placeCache[cacheKey];
          if (place && place.photos && place.photos.length > 0) {
            img.dataset.triedGoogle = '1';
            img.src = place.photos[0].getUrl({ maxWidth: 400, maxHeight: 280 });
            return;
          }
        }
      }
      // No cached photo available, show placeholder
      const placeholder = document.createElement('div');
      placeholder.className = 'card-img-placeholder';
      placeholder.textContent = tabEmoji[activeTab] || '📍';
      img.replaceWith(placeholder);
    }

    function handleIwImgError(img) {
      // Try Google Places photo if not already tried
      if (!img.dataset.triedGoogle) {
        // Find the item from the info-window content
        const iw = img.closest('.info-window');
        if (iw) {
          const name = iw.querySelector('h3')?.textContent;
          const loc = iw.querySelector('.iw-location')?.textContent?.replace('📍 ', '');
          const city = loc ? loc.split(',')[0].trim() : '';
          if (name) {
            const cacheKey = `${name}_${city}`;
            const place = placeCache[cacheKey];
            if (place && place.photos && place.photos.length > 0) {
              img.dataset.triedGoogle = '1';
              img.src = place.photos[0].getUrl({ maxWidth: 600, maxHeight: 300 });
              return;
            }
          }
        }
      }
      const placeholder = document.createElement('div');
      placeholder.style.cssText = 'height:100px;display:flex;align-items:center;justify-content:center;background:#f1f5f9;border-radius:8px;font-size:32px;margin-bottom:10px';
      placeholder.textContent = tabEmoji[activeTab] || '📍';
      img.replaceWith(placeholder);
    }

    const tabColors = {
      'restaurants': { color: '#c0705a', light: '#f5ece8', bg: '#e8d5cd' },
      'asia-restaurants': { color: '#6a9a78', light: '#edf5ef', bg: '#d4e5d8' },
      'bars': { color: '#8a7aaa', light: '#f0ecf5', bg: '#ddd6ea' },
      'condenast': { color: '#c4a04e', light: '#f7f2e6', bg: '#e8dfc8' },
    };

    // ============ INIT MAP ============
    function initMap() {
      map = new google.maps.Map(document.getElementById('map'), {
        center: { lat: 30, lng: 10 },
        zoom: 2,
        styles: [
          { featureType: 'water', stylers: [{ color: '#c8c2b8' }] },
          { featureType: 'landscape', stylers: [{ color: '#FAF6F0' }] },
          { featureType: 'road', stylers: [{ visibility: 'simplified' }, { color: '#ddd6cb' }] },
          { featureType: 'road.highway', stylers: [{ color: '#d5cec3' }] },
          { featureType: 'poi', stylers: [{ visibility: 'off' }] },
          { featureType: 'transit', stylers: [{ visibility: 'off' }] },
          { elementType: 'labels.text.fill', stylers: [{ color: '#9a938c' }] },
          { elementType: 'labels.text.stroke', stylers: [{ color: '#FAF6F0' }, { weight: 3 }] },
          { featureType: 'administrative', elementType: 'geometry.stroke', stylers: [{ color: '#c8c2b8' }] },
        ],
        mapTypeControl: false,
        streetViewControl: false,
        fullscreenControl: true,
        zoomControl: true,
      });
      infoWindow = new google.maps.InfoWindow();
      detectUserAirport();
      loadTab('restaurants');
    }

    // ============ LOAD TAB ============
    function loadTab(tabId) {
      activeTab = tabId;
      const colors = tabColors[tabId];

      // Update CSS vars
      document.documentElement.style.setProperty('--active-color', colors.color);
      document.documentElement.style.setProperty('--active-light', colors.light);
      document.documentElement.style.setProperty('--active-bg', colors.bg);

      // Update card panel bg
      document.getElementById('cardPanel').style.background = colors.light;

      // Update active tab button
      document.querySelectorAll('.tab-btn').forEach(btn => {
        btn.classList.toggle('active', btn.dataset.tab === tabId);
      });

      // Reset filters
      document.getElementById('countryFilter').value = '';
      document.getElementById('cityFilter').value = '';
      document.getElementById('sortSelect').value = 'rank';

      // Load data
      const data = datasets[tabId]();
      populateFilters(data);
      renderList(data);
    }

    // ============ POPULATE FILTERS ============
    function populateFilters(data) {
      const countries = [...new Set(data.map(d => d.country))].sort();
      const cities = [...new Set(data.map(d => d.city))].sort();

      const countrySelect = document.getElementById('countryFilter');
      countrySelect.innerHTML = '<option value="">All Countries</option>' +
        countries.map(c => `<option value="${c}">${c}</option>`).join('');

      const citySelect = document.getElementById('cityFilter');
      citySelect.innerHTML = '<option value="">All Cities</option>' +
        cities.map(c => `<option value="${c}">${c}</option>`).join('');
    }

    // ============ FILTER DATA ============
    function getFilteredData() {
      const data = datasets[activeTab]();
      const country = document.getElementById('countryFilter').value;
      const city = document.getElementById('cityFilter').value;
      const filtered = data.filter(d => {
        if (country && d.country !== country) return false;
        if (city && d.city !== city) return false;
        return true;
      });
      return getSortedData(filtered);
    }

    // ============ RENDER LIST ============
    const tabEmoji = {
      'restaurants': '🍽️',
      'asia-restaurants': '🥢',
      'bars': '🍸',
      'condenast': '✨',
    };

    function renderList(data) {
      clearMarkers();
      infoWindow.close();
      activeCardEl = null;

      const panel = document.getElementById('cardPanel');
      const colors = tabColors[activeTab];
      const emoji = tabEmoji[activeTab];

      if (data.length === 0) {
        panel.innerHTML = '<div class="no-results">No results found</div>';
        return;
      }

      panel.innerHTML = `<div class="list-count">${data.length} places</div>` +
        data.map((item, i) => `
          <div class="card" data-index="${i}" onclick="focusItem(${i})" onmouseenter="highlightMarker(${i})" onmouseleave="unhighlightMarker(${i})">
            <img class="card-img" src="${getImageUrl(item, 400, 280)}" alt="${item.name}" loading="lazy" onerror="handleImgError(this)">
            <div class="card-content">
              <div class="card-rank">${item.rank}</div>
              <div class="card-body">
                <div class="card-name">${item.name}</div>
                <div class="card-location">📍 ${item.city}, ${item.country}</div>
                <div class="card-desc">${item.description}</div>
                <div class="card-meta" id="card-meta-${i}"></div>
                ${renderCardTransportTags(item.city)}
                ${item.website ? `<a class="card-link" href="${item.website}" target="_blank" rel="noopener" onclick="event.stopPropagation()">Visit website →</a>` : ''}
              </div>
            </div>
          </div>
        `).join('');

      // Add markers
      const bounds = new google.maps.LatLngBounds();
      data.forEach((item, i) => {
        const marker = new google.maps.Marker({
          position: { lat: item.lat, lng: item.lng },
          map: map,
          title: item.name,
          label: {
            text: String(item.rank),
            color: 'white',
            fontWeight: '700',
            fontSize: '11px',
          },
          icon: {
            path: google.maps.SymbolPath.CIRCLE,
            scale: 14,
            fillColor: colors.color,
            fillOpacity: 0.85,
            strokeColor: '#FAF6F0',
            strokeWeight: 2,
          },
          animation: google.maps.Animation.DROP,
        });

        marker.addListener('click', () => {
          openInfoWindow(marker, item);
          highlightCard(i);
        });

        markers.push(marker);
        bounds.extend(marker.getPosition());
      });

      if (data.length > 0) {
        map.fitBounds(bounds, { padding: 50 });
      }

      // Pre-fetch place details for cards (price, rating, photos)
      prefetchPlaceDetails(data);

      // Build transport markers (shown if toggle is active)
      buildTransportMarkers(data);
    }

    // ============ MARKERS ============
    function clearMarkers() {
      markers.forEach(m => m.setMap(null));
      markers = [];
      clearTransportMarkers();
    }

    // ============ TRANSPORT MARKERS ============
    let transportMarkers = { airports: [], trains: [] };
    let transportVisible = { airports: false, trains: false };

    function clearTransportMarkers() {
      transportMarkers.airports.forEach(m => m.setMap(null));
      transportMarkers.trains.forEach(m => m.setMap(null));
      transportMarkers = { airports: [], trains: [] };
      // Keep toggle state but refresh markers
    }

    function buildTransportMarkers(data) {
      clearTransportMarkers();
      const transport = window.DATA_TRANSPORT || {};
      const seenAirports = new Set();
      const seenTrains = new Set();

      data.forEach(item => {
        const t = transport[item.city];
        if (!t) return;

        (t.airports || []).forEach(a => {
          const key = a.code || a.name;
          if (seenAirports.has(key)) return;
          seenAirports.add(key);
          if (!a.lat || !a.lng) return;

          const marker = new google.maps.Marker({
            position: { lat: a.lat, lng: a.lng },
            map: transportVisible.airports ? map : null,
            title: `${a.name} (${a.code || ''})`,
            icon: {
              path: 'M21,16v-2l-8-5V3.5C13,2.67,12.33,2,11.5,2S10,2.67,10,3.5V9l-8,5v2l8-2.5V19l-2,1.5V22l3.5-1l3.5,1v-1.5L13,19v-5.5L21,16z',
              fillColor: '#1e40af',
              fillOpacity: 0.9,
              strokeColor: '#ffffff',
              strokeWeight: 1.5,
              scale: 1.2,
              anchor: new google.maps.Point(12, 12),
            },
            zIndex: 100,
          });

          marker.addListener('click', () => {
            infoWindow.setContent(`
              <div style="font-family:Inter,sans-serif;padding:4px;">
                <div style="font-size:14px;font-weight:800;">✈️ ${a.name}</div>
                ${a.code && a.code !== '—' ? `<div style="display:inline-block;background:#dbeafe;color:#1e40af;font-size:11px;font-weight:800;padding:2px 8px;border-radius:4px;margin:4px 0;">${a.code}</div>` : ''}
                <div style="font-size:12px;color:#64748b;margin-top:2px;">${a.distance} from ${item.city}</div>
              </div>
            `);
            infoWindow.open(map, marker);
          });

          transportMarkers.airports.push(marker);
        });

        (t.trains || []).forEach(s => {
          const key = s.name;
          if (seenTrains.has(key)) return;
          seenTrains.add(key);
          if (!s.lat || !s.lng) return;

          const marker = new google.maps.Marker({
            position: { lat: s.lat, lng: s.lng },
            map: transportVisible.trains ? map : null,
            title: s.name,
            icon: {
              path: google.maps.SymbolPath.BACKWARD_CLOSED_ARROW,
              fillColor: '#065f46',
              fillOpacity: 0.9,
              strokeColor: '#ffffff',
              strokeWeight: 1.5,
              scale: 5,
            },
            zIndex: 99,
          });

          marker.addListener('click', () => {
            infoWindow.setContent(`
              <div style="font-family:Inter,sans-serif;padding:4px;">
                <div style="font-size:14px;font-weight:800;">🚆 ${s.name}</div>
                <div style="font-size:12px;color:#64748b;margin-top:2px;">${s.lines}</div>
              </div>
            `);
            infoWindow.open(map, marker);
          });

          transportMarkers.trains.push(marker);
        });
      });
    }

    function toggleTransportMarkers(type) {
      transportVisible[type] = !transportVisible[type];
      const btn = type === 'airports' ? document.getElementById('toggleAirports') : document.getElementById('toggleTrains');
      btn.classList.toggle('active', transportVisible[type]);

      transportMarkers[type].forEach(m => {
        m.setMap(transportVisible[type] ? map : null);
      });
    }

    function highlightMarker(index) {
      if (markers[index]) {
        markers[index].setAnimation(google.maps.Animation.BOUNCE);
      }
    }

    function unhighlightMarker(index) {
      if (markers[index]) {
        markers[index].setAnimation(null);
      }
    }

    // ============ GOOGLE STARS HELPER ============
    function renderStars(rating) {
      const full = Math.floor(rating);
      const half = rating - full >= 0.5 ? 1 : 0;
      const empty = 5 - full - half;
      return '★'.repeat(full) + (half ? '½' : '') + '☆'.repeat(empty);
    }

    // ============ PRICE HELPER ============
    function renderPrice(priceLevel) {
      if (priceLevel == null) return '';
      const labels = ['Free', '$', '$$', '$$$', '$$$$'];
      const ranges = ['', '~$15–30/person', '~$30–60/person', '~$60–150/person', '~$150+/person'];
      const filled = labels[priceLevel] || '';
      const range = ranges[priceLevel] || '';
      return `<div class="iw-price-row">
        <span class="iw-price-level">${filled}</span>
        <span class="iw-price-range">${range}</span>
      </div>`;
    }

    // ============ PLACES SERVICE ============
    let placesService;
    const placeCache = {};

    function getPlacesService() {
      if (!placesService) {
        placesService = new google.maps.places.PlacesService(map);
      }
      return placesService;
    }

    function fetchGoogleReviews(item, containerId) {
      const cacheKey = `${item.name}_${item.city}`;
      if (placeCache[cacheKey]) {
        renderReviews(placeCache[cacheKey], containerId);
        return;
      }

      const service = getPlacesService();
      const request = {
        query: `${item.name} ${item.city}`,
        fields: ['place_id', 'name'],
      };

      service.findPlaceFromQuery(request, (results, status) => {
        if (status === google.maps.places.PlacesServiceStatus.OK && results && results[0]) {
          service.getDetails({
            placeId: results[0].place_id,
            fields: ['rating', 'user_ratings_total', 'reviews', 'url', 'price_level', 'photos'],
          }, (place, detailStatus) => {
            if (detailStatus === google.maps.places.PlacesServiceStatus.OK && place) {
              placeCache[cacheKey] = place;
              renderReviews(place, containerId);
            } else {
              renderReviewsError(containerId);
            }
          });
        } else {
          renderReviewsError(containerId);
        }
      });
    }

    function renderReviews(place, containerId) {
      const el = document.getElementById(containerId);
      if (!el) return;

      const reviews = (place.reviews || []).slice(0, 3);
      el.innerHTML = `
        <div class="iw-rating-row">
          <span class="iw-rating-score">${place.rating ? place.rating.toFixed(1) : '—'}</span>
          <span class="iw-stars">${place.rating ? renderStars(place.rating) : ''}</span>
          <span class="iw-rating-count">(${place.user_ratings_total ? place.user_ratings_total.toLocaleString() : 0})</span>
        </div>
        ${renderPrice(place.price_level)}
        ${reviews.map(r => `
          <div class="iw-review">
            <div class="iw-review-header">
              <span class="iw-review-author">${r.author_name}</span>
              <span class="iw-review-stars">${renderStars(r.rating)}</span>
              <span class="iw-review-time">${r.relative_time_description}</span>
            </div>
            <div class="iw-review-text">${r.text}</div>
          </div>
        `).join('')}
        ${place.url ? `<a class="iw-google-link" href="${place.url}" target="_blank" rel="noopener">View on Google Maps →</a>` : ''}
      `;
    }

    function renderReviewsError(containerId) {
      const el = document.getElementById(containerId);
      if (!el) return;
      el.innerHTML = '<div class="iw-loading-reviews">Google reviews unavailable</div>';
    }

    // ============ PRE-FETCH PLACE DETAILS ============
    let prefetchQueue = [];
    let prefetchRunning = false;

    function prefetchPlaceDetails(data) {
      prefetchQueue = data.map((item, i) => ({ item, index: i }));
      if (!prefetchRunning) drainPrefetchQueue();
    }

    function drainPrefetchQueue() {
      if (prefetchQueue.length === 0) { prefetchRunning = false; return; }
      prefetchRunning = true;
      const { item, index } = prefetchQueue.shift();
      const cacheKey = `${item.name}_${item.city}`;

      if (placeCache[cacheKey]) {
        updateCardMeta(placeCache[cacheKey], index);
        updateCardPhoto(placeCache[cacheKey], index);
        setTimeout(drainPrefetchQueue, 50);
        return;
      }

      const service = getPlacesService();
      service.findPlaceFromQuery({
        query: `${item.name} ${item.city}`,
        fields: ['place_id', 'name'],
      }, (results, status) => {
        if (status === google.maps.places.PlacesServiceStatus.OK && results && results[0]) {
          service.getDetails({
            placeId: results[0].place_id,
            fields: ['rating', 'user_ratings_total', 'reviews', 'url', 'price_level', 'photos'],
          }, (place, dStatus) => {
            if (dStatus === google.maps.places.PlacesServiceStatus.OK && place) {
              placeCache[cacheKey] = place;
              updateCardMeta(place, index);
              updateCardPhoto(place, index);
            }
            // Delay between requests to avoid rate limiting
            setTimeout(drainPrefetchQueue, 300);
          });
        } else {
          setTimeout(drainPrefetchQueue, 300);
        }
      });
    }

    function updateCardMeta(place, index) {
      const el = document.getElementById(`card-meta-${index}`);
      if (!el) return;
      let html = '';
      if (place.price_level != null) {
        const labels = ['Free', '$', '$$', '$$$', '$$$$'];
        html += `<span class="card-price">${labels[place.price_level] || ''}</span>`;
      }
      if (place.rating) {
        html += `<span class="card-rating"><span class="card-stars">★</span> ${place.rating.toFixed(1)} <span style="color:#94a3b8">(${(place.user_ratings_total || 0).toLocaleString()})</span></span>`;
      }
      el.innerHTML = html;
    }

    function updateCardPhoto(place, index) {
      if (!place.photos || place.photos.length === 0) return;
      const card = document.querySelector(`.card[data-index="${index}"]`);
      if (!card) return;
      const img = card.querySelector('.card-img');
      const placeholder = card.querySelector('.card-img-placeholder');
      const photoUrl = place.photos[0].getUrl({ maxWidth: 400, maxHeight: 280 });

      if (placeholder) {
        // Replace placeholder with real photo
        const newImg = document.createElement('img');
        newImg.className = 'card-img';
        newImg.src = photoUrl;
        newImg.alt = '';
        newImg.loading = 'lazy';
        newImg.onerror = function() { handleImgError(this); };
        placeholder.replaceWith(newImg);
      } else if (img && img.naturalWidth === 0) {
        // Image failed to load, replace src
        img.src = photoUrl;
      }
    }

    // ============ SORT HELPER ============
    function getSortedData(data) {
      const sort = document.getElementById('sortSelect').value;
      if (sort === 'rank') return data;

      // We need cached place data for price/rating sorts
      const withPlaceData = data.map(item => {
        const cacheKey = `${item.name}_${item.city}`;
        const place = placeCache[cacheKey];
        return { ...item, _price: place?.price_level ?? 999, _rating: place?.rating ?? 0 };
      });

      if (sort === 'price-asc') {
        withPlaceData.sort((a, b) => a._price - b._price);
      } else if (sort === 'price-desc') {
        withPlaceData.sort((a, b) => {
          // Put items without price at the end
          if (a._price === 999 && b._price === 999) return 0;
          if (a._price === 999) return 1;
          if (b._price === 999) return -1;
          return b._price - a._price;
        });
      } else if (sort === 'rating') {
        withPlaceData.sort((a, b) => b._rating - a._rating);
      }
      return withPlaceData;
    }

    // ============ TRANSPORT HELPER ============
    function getTransport(city) {
      const t = window.DATA_TRANSPORT || {};
      return t[city] || null;
    }

    // Detect user's nearest airport via geolocation
    let userOriginCode = null;
    function detectUserAirport() {
      if (userOriginCode) return;
      if (!navigator.geolocation) return;
      navigator.geolocation.getCurrentPosition(pos => {
        const uLat = pos.coords.latitude;
        const uLng = pos.coords.longitude;
        let best = null, bestDist = Infinity;
        // Search all airports in transport data
        Object.values(window.DATA_TRANSPORT || {}).forEach(t => {
          (t.airports || []).forEach(a => {
            if (!a.code || a.code === '—') return;
            const d = Math.pow(a.lat - uLat, 2) + Math.pow((a.lng - uLng) * Math.cos(uLat * Math.PI / 180), 2);
            if (d < bestDist) { bestDist = d; best = a.code; }
          });
        });
        if (best) {
          userOriginCode = best;
          localStorage.setItem('userOriginAirport', best);
        }
      }, () => {
        // Geolocation denied — try cached value
        userOriginCode = localStorage.getItem('userOriginAirport');
      }, { timeout: 5000 });
      // Also load cached value immediately for fast display
      userOriginCode = localStorage.getItem('userOriginAirport') || null;
    }
    // detectUserAirport() is called inside initMap after data is loaded

    function getSkyscannerLink(destCode) {
      if (!userOriginCode || !destCode || destCode === '—') return '';
      if (userOriginCode === destCode) return '';
      const d = new Date();
      d.setDate(d.getDate() + 28);
      const dateStr = d.toISOString().slice(2, 10).replace(/-/g, '');
      const url = `https://www.skyscanner.net/transport/flights/${userOriginCode}/${destCode}/${dateStr}/`;
      return `<a class="sky-link" href="${url}" target="_blank" rel="noopener" title="Search flights ${userOriginCode} → ${destCode} on Skyscanner"><svg viewBox="0 0 24 24"><path d="M21.5 4.5c-.4-.4-1.2-.6-2.2-.4-1.1.2-2.5.8-4 1.8L12 8.2l-4.8-2c-.3-.1-.6 0-.8.2L5 7.8c-.2.2-.2.5 0 .7l3.6 2.4-2.4 1.8-1.8-.6c-.2-.1-.5 0-.6.1l-.9.9c-.2.2-.2.5 0 .6l2.4 1.6 1.6 2.4c.1.2.4.3.6 0l.9-.9c.2-.2.2-.4.1-.6l-.6-1.8 1.8-2.4 2.4 3.6c.2.2.5.3.7 0l1.4-1.4c.2-.2.3-.5.2-.8l-2-4.8 2.3-3.3c1-1.5 1.6-2.9 1.8-4 .2-1-.1-1.8-.5-2.2z"/></svg>${userOriginCode} → ${destCode}</a>`;
    }

    function getSkyscannerHotelLink(item) {
      const url = `https://www.skyscanner.net/hotels`;
      return `<a class="iw-link sky-hotel" href="${url}" target="_blank" rel="noopener">Book on Skyscanner →</a>`;
    }

    function renderTransportHtml(city) {
      const t = getTransport(city);
      if (!t) return '';
      const airports = (t.airports || []).map(a =>
        `<div class="iw-transport-item">
          <span class="iw-transport-icon">✈️</span>
          <div style="flex:1"><span class="iw-transport-name">${a.name}</span>${a.code && a.code !== '—' ? `<span class="iw-transport-code">${a.code}</span>` : ''}<br><span class="iw-transport-detail">${a.distance}</span></div>
          ${getSkyscannerLink(a.code)}
        </div>`
      ).join('');
      const trains = (t.trains || []).map(s =>
        `<div class="iw-transport-item">
          <span class="iw-transport-icon">🚆</span>
          <div><span class="iw-transport-name">${s.name}</span><br><span class="iw-transport-detail">${s.lines}</span></div>
        </div>`
      ).join('');
      if (!airports && !trains) return '';
      return `<div class="iw-transport">
        <div class="iw-transport-title">Getting There</div>
        ${airports}${trains}
      </div>`;
    }

    function renderCardTransportTags(city) {
      const t = getTransport(city);
      if (!t) return '';
      let tags = '';
      (t.airports || []).forEach(a => {
        if (a.code && a.code !== '—') {
          tags += `<span class="card-transport-tag">✈ ${a.code}</span>`;
        }
      });
      (t.trains || []).slice(0, 1).forEach(s => {
        const short = s.name.length > 20 ? s.name.slice(0, 18) + '…' : s.name;
        tags += `<span class="card-transport-tag train">🚆 ${short}</span>`;
      });
      return tags ? `<div class="card-transport">${tags}</div>` : '';
    }

    // ============ INFO WINDOW ============
    let iwCounter = 0;
    function getInfoWindowImageUrl(item) {
      // Prefer Google Places photo if cached
      const cacheKey = `${item.name}_${item.city}`;
      const place = placeCache[cacheKey];
      if (place && place.photos && place.photos.length > 0) {
        return place.photos[0].getUrl({ maxWidth: 600, maxHeight: 300 });
      }
      return getImageUrl(item, 600, 300);
    }

    function openInfoWindow(marker, item) {
      const reviewId = `iw-reviews-${++iwCounter}`;
      const imgUrl = getInfoWindowImageUrl(item);
      const content = `
        <div class="info-window">
          <button class="iw-close-btn" onclick="infoWindow.close()" aria-label="Close">&times;</button>
          <img class="iw-img" src="${imgUrl}" alt="${item.name}" onerror="handleIwImgError(this)">
          <span class="iw-rank">#${item.rank}</span>
          <h3>${item.name}</h3>
          <div class="iw-location">📍 ${item.city}, ${item.country}</div>
          <div class="iw-desc">${item.description}</div>
          <div class="iw-links">
            ${item.website ? `<a class="iw-link" href="${item.website}" target="_blank" rel="noopener">Visit website →</a>` : ''}
            ${activeTab === 'condenast' ? getSkyscannerHotelLink(item) : ''}
          </div>
          <div class="iw-google-section" id="${reviewId}">
            <div class="iw-loading-reviews">Loading Google reviews...</div>
          </div>
          ${renderTransportHtml(item.city)}
        </div>
      `;
      infoWindow.setContent(content);
      infoWindow.open(map, marker);

      // Fetch reviews after InfoWindow is rendered
      google.maps.event.addListenerOnce(infoWindow, 'domready', () => {
        fetchGoogleReviews(item, reviewId);
      });
    }

    // ============ CARD INTERACTIONS ============
    function focusItem(index) {
      const data = getFilteredData();
      const item = data[index];
      if (!item || !markers[index]) return;

      map.panTo(markers[index].getPosition());
      map.setZoom(14);
      openInfoWindow(markers[index], item);
      highlightCard(index);
    }

    function highlightCard(index) {
      if (activeCardEl) activeCardEl.classList.remove('active');
      const card = document.querySelector(`.card[data-index="${index}"]`);
      if (card) {
        card.classList.add('active');
        card.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
        activeCardEl = card;
      }
    }

    // ============ EVENT LISTENERS ============
    document.getElementById('tabBar').addEventListener('click', e => {
      const btn = e.target.closest('.tab-btn');
      if (btn) loadTab(btn.dataset.tab);
    });

    document.getElementById('countryFilter').addEventListener('change', () => {
      // Update city filter based on selected country
      const country = document.getElementById('countryFilter').value;
      const data = datasets[activeTab]();
      const filtered = country ? data.filter(d => d.country === country) : data;
      const cities = [...new Set(filtered.map(d => d.city))].sort();
      const citySelect = document.getElementById('cityFilter');
      const currentCity = citySelect.value;
      citySelect.innerHTML = '<option value="">All Cities</option>' +
        cities.map(c => `<option value="${c}"${c === currentCity ? ' selected' : ''}>${c}</option>`).join('');
      renderList(getFilteredData());
    });

    document.getElementById('cityFilter').addEventListener('change', () => {
      renderList(getFilteredData());
    });

    document.getElementById('sortSelect').addEventListener('change', () => {
      renderList(getFilteredData());
    });

    document.getElementById('resetFilter').addEventListener('click', () => {
      document.getElementById('countryFilter').value = '';
      document.getElementById('cityFilter').value = '';
      document.getElementById('sortSelect').value = 'rank';
      const data = datasets[activeTab]();
      populateFilters(data);
      renderList(data);
    });

  </script>
